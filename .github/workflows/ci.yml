name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26'

      - name: Install frontend deps (pnpm)
        run: |
          cd app/nextjs
          corepack enable
          corepack prepare pnpm@11.1.2 --activate
          pnpm install --frozen-lockfile

      - name: Run frontend lint
        run: |
          cd app/nextjs
          pnpm run lint || true

      - name: Build frontend
        run: |
          cd app/nextjs
          pnpm run build

      - name: Build go
        run: |
          cd app/go-service
          go build ./...

  build-and-publish:
    name: Build, scan and publish images
    runs-on: ubuntu-latest
    needs: [lint-and-test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GHCR (optional)
        if: ${{ secrets.GHCR_TOKEN != '' }}
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      # Build and optionally push Next image
      - name: Build Next.js image
        uses: docker/build-push-action@v5
        with:
          context: ./app/nextjs
          file: ./app/nextjs/Dockerfile
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository }}/bff-nextjs:${{ github.sha }}
            ghcr.io/${{ github.repository }}/bff-nextjs:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: ${{ secrets.GHCR_TOKEN != '' }}
          load: ${{ secrets.GHCR_TOKEN == '' }}

      # Build and optionally push Go image
      - name: Build Go BFF image
        uses: docker/build-push-action@v5
        with:
          context: ./app/go-service
          file: ./app/go-service/Dockerfile
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository }}/bff-go:${{ github.sha }}
            ghcr.io/${{ github.repository }}/bff-go:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: ${{ secrets.GHCR_TOKEN != '' }}
          load: ${{ secrets.GHCR_TOKEN == '' }}

      - name: Pull pushed images for scanning
        if: ${{ secrets.GHCR_TOKEN != '' }}
        run: |
          docker pull ghcr.io/${{ github.repository }}/bff-nextjs:${{ github.sha }}
          docker pull ghcr.io/${{ github.repository }}/bff-go:${{ github.sha }}

      - name: Scan Next.js image with Trivy
        uses: aquasecurity/trivy-action@v1
        with:
          image-ref: "ghcr.io/${{ github.repository }}/bff-nextjs:${{ github.sha }}"
          format: table
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Scan Go image with Trivy
        uses: aquasecurity/trivy-action@v1
        with:
          image-ref: "ghcr.io/${{ github.repository }}/bff-go:${{ github.sha }}"
          format: table
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Optional: push to ECR (placeholder)
        if: ${{ secrets.AWS_ACCESS_KEY_ID != '' }}
        run: |
          echo "Add ECR login and push steps here"
